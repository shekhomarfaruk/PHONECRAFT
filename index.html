<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoneCraft</title>

    <!-- Favicon — browser tab icon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" type="image/png" href="/logo.png" />

    <!-- PWA: Add to Home Screen -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#23AF91" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PhoneCraft" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- SEO / OG -->
    <meta name="description" content="PhoneCraft - Earn by assembling smartphones online" />
    <meta property="og:title" content="PhoneCraft" />
    <meta property="og:image" content="/logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
