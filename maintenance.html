<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhoneCraft — Under Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #2563eb;
      --blue2:  #3b82f6;
      --blue3:  #dbeafe;
      --gray1:  #f8fafc;
      --gray2:  #f1f5f9;
      --gray3:  #e2e8f0;
      --gray4:  #94a3b8;
      --gray5:  #64748b;
      --dark:   #1e293b;
      --dark2:  #334155;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--gray1);
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ── Background Pattern ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 20% -10%, rgba(37,99,235,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 600px 500px at 85% 110%, rgba(59,130,246,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Dot grid ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 0;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border: 1px solid var(--gray3);
      border-radius: 28px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.04), 0 20px 60px -12px rgba(37,99,235,0.08);
      max-width: 520px;
      width: 100%;
      padding: 56px 48px 48px;
      text-align: center;
      animation: fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    /* ── Logo ── */
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.1s cubic-bezier(.22,.68,0,1.2) both;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(37,99,235,0.3);
      flex-shrink: 0;
    }

    .logo-icon svg { width: 24px; height: 24px; fill: #fff; }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--blue) 0%, #1d4ed8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Floating icons row ── */
    .icons-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 32px;
      animation: fadeUp 0.7s 0.2s cubic-bezier(.22,.68,0,1.2) both;
    }

    .float-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: var(--blue3);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      animation: float 4s ease-in-out infinite;
      border: 1px solid rgba(37,99,235,0.12);
    }

    .float-icon:nth-child(1) { animation-delay: 0s;    }
    .float-icon:nth-child(2) { animation-delay: 0.6s;  width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%); color: #fff; box-shadow: 0 8px 24px rgba(37,99,235,0.25); }
    .float-icon:nth-child(3) { animation-delay: 1.2s;  }

    .float-icon svg { width: 22px; height: 22px; }
    .float-icon:nth-child(2) svg { width: 28px; height: 28px; }

    @keyframes float {
      0%, 100% { transform: translateY(0);   }
      50%       { transform: translateY(-8px); }
    }

    /* ── Typography ── */
    h1 {
      font-size: clamp(22px, 5vw, 28px);
      font-weight: 800;
      color: var(--dark);
      letter-spacing: -0.5px;
      line-height: 1.25;
      margin-bottom: 14px;
      animation: fadeUp 0.7s 0.25s cubic-bezier(.22,.68,0,1.2) both;
    }

    .sub {
      font-size: 15px;
      font-weight: 400;
      color: var(--gray5);
      line-height: 1.65;
      margin-bottom: 8px;
      animation: fadeUp 0.7s 0.3s cubic-bezier(.22,.68,0,1.2) both;
    }

    .note {
      font-size: 13px;
      color: var(--gray4);
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.35s cubic-bezier(.22,.68,0,1.2) both;
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--blue2));
      border-radius: 99px;
      margin: 0 auto 28px;
      animation: fadeUp 0.7s 0.28s cubic-bezier(.22,.68,0,1.2) both;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.4s cubic-bezier(.22,.68,0,1.2) both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray4);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .progress-track {
      height: 6px;
      background: var(--gray2);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--gray3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue) 0%, #60a5fa 100%);
      border-radius: 99px;
      width: 0%;
      animation: progressAnim 3s ease-in-out 0.8s forwards;
    }

    @keyframes progressAnim {
      0%   { width: 0%; }
      40%  { width: 55%; }
      70%  { width: 72%; }
      100% { width: 88%; }
    }

    /* ── Spinner dots ── */
    .dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.45s cubic-bezier(.22,.68,0,1.2) both;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue2);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s;    background: var(--blue); }
    .dot:nth-child(2) { animation-delay: 0.16s; background: var(--blue2); }
    .dot:nth-child(3) { animation-delay: 0.32s; background: #93c5fd; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.7s 0.5s cubic-bezier(.22,.68,0,1.2) both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 22px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue2) 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(37,99,235,0.25);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37,99,235,0.35);
    }

    .btn-outline {
      background: #fff;
      color: var(--blue);
      border: 1.5px solid var(--gray3);
    }

    .btn-outline:hover {
      border-color: var(--blue2);
      background: var(--blue3);
      transform: translateY(-2px);
    }

    .btn svg { width: 16px; height: 16px; }

    /* ── Footer tag ── */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: var(--gray4);
      animation: fadeUp 0.7s 0.6s cubic-bezier(.22,.68,0,1.2) both;
      letter-spacing: 0.2px;
    }

    .footer a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; border-radius: 22px; }
      .float-icon:nth-child(2) { width: 56px; height: 56px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 1H7C5.34 1 4 2.34 4 4v16c0 1.66 1.34 3 3 3h10c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-5 20c-.83 0-1.5-.67-1.5-1.5S11.17 18 12 18s1.5.67 1.5 1.5S12.83 21 12 21zm6-4H6V4h12v13z"/>
          </svg>
        </div>
        <span class="logo-text">PhoneCraft</span>
      </div>

      <!-- Animated icons row -->
      <div class="icons-row">
        <!-- Gear -->
        <div class="float-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </div>
        <!-- Phone (center, large) -->
        <div class="float-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 1H7C5.34 1 4 2.34 4 4v16c0 1.66 1.34 3 3 3h10c1.66 0 3-1.34 3-3V4c0-1.66-1.34-3-3-3zm-5 20c-.83 0-1.5-.67-1.5-1.5S11.17 18 12 18s1.5.67 1.5 1.5S12.83 21 12 21zm6-4H6V4h12v13z"/></svg>
        </div>
        <!-- Wrench -->
        <div class="float-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        </div>
      </div>

      <!-- Heading -->
      <h1>We're Upgrading Our System</h1>
      <div class="divider"></div>
      <p class="sub">Our website is currently under maintenance<br>to serve you better.</p>
      <p class="note">We'll be back shortly. Thank you for your patience.</p>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Maintenance in progress</span>
          <span id="pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- Bouncing dots -->
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn btn-primary" onclick="location.reload()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Try Refreshing
        </button>
        <a href="mailto:support@phonecraft.tech" class="btn btn-outline">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          Contact Us
        </a>
      </div>

    </div>

    <div class="footer">
      &copy; <span id="yr"></span> PhoneCraft. All rights reserved. &nbsp;·&nbsp;
      <a href="mailto:support@phonecraft.tech">support@phonecraft.tech</a>
    </div>
  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Animate percentage counter alongside progress bar
    const fill = document.getElementById('progressFill');
    const pct  = document.getElementById('pct');

    const targets = [
      { pct: 55, delay: 800,  dur: 1200 },
      { pct: 72, delay: 2000, dur: 700  },
      { pct: 88, delay: 2700, dur: 900  },
    ];

    let current = 0;
    function animateTo(target, delay, dur) {
      setTimeout(() => {
        const start    = current;
        const diff     = target - start;
        const startTs  = performance.now();
        function step(ts) {
          const elapsed = ts - startTs;
          const progress = Math.min(elapsed / dur, 1);
          const ease = 1 - Math.pow(1 - progress, 3);
          current = Math.round(start + diff * ease);
          pct.textContent = current + '%';
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }, delay);
    }

    targets.forEach(t => animateTo(t.pct, t.delay, t.dur));
  </script>
</body>
</html>
