kind = "web"
previewPath = "/admin-panel/"
title = "Admin Panel"
version = "1.0.0"
id = "artifacts/admin-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin-panel/" ]
localPort = 24480

[services.development]
run = "pnpm --filter @workspace/admin-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-panel", "run", "build" ]
publicDir = "artifacts/admin-panel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24480"
BASE_PATH = "/admin-panel/"
