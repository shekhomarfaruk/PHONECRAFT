name: Build and Deploy Node.js App to Azure Web App - phonecraft

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install all dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build main frontend
        run: PORT=3000 BASE_PATH=/ pnpm --filter @workspace/phonecraft run build
        env:
          NODE_ENV: production

      - name: Build admin panel
        run: PORT=3000 BASE_PATH=/xpc-ctrl-7f3b/ pnpm --filter @workspace/admin-panel run build
        env:
          NODE_ENV: production

      - name: Prepare server directory
        run: |
          mkdir -p server/services
          cp artifacts/api-server/phonecraft/index.js server/
          cp artifacts/api-server/phonecraft/db.js server/
          cp -r artifacts/api-server/phonecraft/services/. server/services/
          echo '{
            "name": "phonecraft-server",
            "version": "1.0.0",
            "type": "commonjs",
            "main": "index.js",
            "scripts": { "start": "node index.js" },
            "dependencies": {
              "express": "^4",
              "cors": "^2",
              "bcryptjs": "^2.4.3",
              "better-sqlite3": "^12.8.0",
              "dotenv": "^16.4.5",
              "node-fetch": "^3.3.2",
              "cookie-parser": "^1.4.7",
              "web-push": "^3.6.7",
              "multer": "^2.1.1"
            }
          }' > server/package.json
          cd server && npm install --production

      - name: Create .env at root level
        run: |
          printf 'PORT=8080\nNODE_ENV=production\n' > .env
          printf 'AUTH_SECRET=%s\n' "${{ secrets.AUTH_SECRET }}" >> .env
          printf 'TELEGRAM_SUPPORT_BOT_TOKEN=%s\n' "$SUPPORT_TOKEN" >> .env
          printf 'TELEGRAM_FINANCE_BOT_TOKEN=%s\n' "$FINANCE_TOKEN" >> .env
          printf 'TELEGRAM_SUPPORT_CHAT_IDS=%s\n' "${{ secrets.TELEGRAM_SUPPORT_CHAT_IDS }}" >> .env
          printf 'TELEGRAM_FINANCE_CHAT_IDS=%s\n' "${{ secrets.TELEGRAM_FINANCE_CHAT_IDS }}" >> .env
          printf 'TELEGRAM_FINANCE_CHAT_ID=%s\n' "${{ secrets.TELEGRAM_FINANCE_CHAT_ID }}" >> .env
          printf 'TELEGRAM_ADMIN_CHAT_IDS=%s\n' "${{ secrets.TELEGRAM_ADMIN_CHAT_IDS }}" >> .env
          printf 'MAIN_ADMIN_REFER_CODE=%s\n' "${{ secrets.MAIN_ADMIN_REFER_CODE }}" >> .env
          printf 'WEBHOOK_URL=%s\n' "${{ secrets.WEBHOOK_URL }}" >> .env
          printf 'VAPID_PUBLIC_KEY=%s\n' "${{ secrets.VAPID_PUBLIC_KEY }}" >> .env
          printf 'VAPID_PRIVATE_KEY=%s\n' "${{ secrets.VAPID_PRIVATE_KEY }}" >> .env
        env:
          SUPPORT_TOKEN: ${{ secrets.TELEGRAM_SUPPORT_BOT_TOKEN }}
          FINANCE_TOKEN: ${{ secrets.TELEGRAM_FINANCE_BOT_TOKEN }}

      - name: Copy frontend builds
        run: |
          cp -r artifacts/phonecraft/dist/public dist
          mkdir -p dist/xpc-ctrl-7f3b
          cp -r artifacts/admin-panel/dist/public/. dist/xpc-ctrl-7f3b/

      - name: Inject admin panel SPA routing into server
        run: |
          python3 - << 'PYEOF'
          with open('server/index.js', 'r') as f:
              code = f.read()

          old_catchall = (
              "// ── SPA fallback — serve index.html for non-API routes ───────────────────────\n"
              "app.get('*', (_req, res) => {\n"
              "  res.sendFile(path.join(__dirname, '..', 'dist', 'index.html'));\n"
              "});"
          )
          new_catchall = (
              "// ── SPA fallback (admin panel + main app) ──────────────────────────────────────\n"
              "app.get('/xpc-ctrl-7f3b', (req, res) => res.redirect('/xpc-ctrl-7f3b/'));\n"
              "app.get('/xpc-ctrl-7f3b/*', (req, res) => {\n"
              "  res.sendFile(path.join(__dirname, '..', 'dist', 'xpc-ctrl-7f3b', 'index.html'));\n"
              "});\n"
              "app.get('*', (_req, res) => {\n"
              "  res.sendFile(path.join(__dirname, '..', 'dist', 'index.html'));\n"
              "});"
          )

          if old_catchall in code:
              code = code.replace(old_catchall, new_catchall, 1)
              print("SPA catch-all replaced successfully.")
          else:
              code = code.replace('app.listen(', new_catchall + '\n\napp.listen(', 1)
              print("Fallback: injected before app.listen.")

          with open('server/index.js', 'w') as f:
              f.write(code)
          PYEOF

      - name: Archive production artifacts
        run: zip -r release.zip server dist .env start.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure via Kudu ZipDeploy
        run: |
          echo "Deploying to Azure..."
          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            "https://phonecraft-heddcdhuf0ajcyev.scm.eastus-01.azurewebsites.net/api/zipdeploy?isAsync=false" \
            --user "${{ secrets.KUDU_DEPLOY_USER }}:${{ secrets.KUDU_DEPLOY_PASS }}" \
            -H "Content-Type: application/zip" \
            --data-binary @release.zip \
            --max-time 300)
          echo "HTTP Response: $HTTP_CODE"
          cat /tmp/deploy_response.txt || true
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed with HTTP $HTTP_CODE"
            exit 1
          fi
