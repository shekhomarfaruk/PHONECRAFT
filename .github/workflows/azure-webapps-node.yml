name: Build and Deploy Node.js App to Azure Web App - phonecraft

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install all dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: PORT=3000 BASE_PATH=/ pnpm --filter @workspace/phonecraft run build
        env:
          NODE_ENV: production

      - name: Prepare server directory
        run: |
          mkdir -p server/services
          cp artifacts/api-server/phonecraft/index.js server/
          cp artifacts/api-server/phonecraft/db.js server/
          cp -r artifacts/api-server/phonecraft/services/. server/services/
          echo '{
            "name": "phonecraft-server",
            "version": "1.0.0",
            "type": "commonjs",
            "main": "index.js",
            "scripts": { "start": "node index.js" },
            "dependencies": {
              "express": "^4",
              "cors": "^2",
              "bcryptjs": "^2.4.3",
              "better-sqlite3": "^12.8.0",
              "dotenv": "^16.4.5",
              "node-fetch": "^3.3.2",
              "cookie-parser": "^1.4.7"
            }
          }' > server/package.json
          cd server && npm install --production

      - name: Create .env at root level
        run: |
          printf 'PORT=8080\nNODE_ENV=production\n' > .env
          printf 'TELEGRAM_SUPPORT_BOT_TOKEN=%s\n' "$SUPPORT_TOKEN" >> .env
          printf 'TELEGRAM_FINANCE_BOT_TOKEN=%s\n' "$FINANCE_TOKEN" >> .env
          printf 'TELEGRAM_SUPPORT_CHAT_IDS=%s\n' "${{ secrets.TELEGRAM_SUPPORT_CHAT_IDS }}" >> .env
          printf 'TELEGRAM_FINANCE_CHAT_IDS=%s\n' "${{ secrets.TELEGRAM_FINANCE_CHAT_IDS }}" >> .env
          printf 'TELEGRAM_FINANCE_CHAT_ID=%s\n' "${{ secrets.TELEGRAM_FINANCE_CHAT_ID }}" >> .env
          printf 'TELEGRAM_ADMIN_CHAT_IDS=%s\n' "${{ secrets.TELEGRAM_ADMIN_CHAT_IDS }}" >> .env
          printf 'MAIN_ADMIN_REFER_CODE=%s\n' "${{ secrets.MAIN_ADMIN_REFER_CODE }}" >> .env
          printf 'WEBHOOK_URL=%s\n' "${{ secrets.WEBHOOK_URL }}" >> .env
        env:
          SUPPORT_TOKEN: ${{ secrets.TELEGRAM_SUPPORT_BOT_TOKEN }}
          FINANCE_TOKEN: ${{ secrets.TELEGRAM_FINANCE_BOT_TOKEN }}

      - name: Copy frontend build
        run: cp -r artifacts/phonecraft/dist/public dist

      - name: Enable static file serving and SPA fallback
        run: |
          sed -i "s|// app.use(express.static(path.join(__dirname, '..', 'dist')));|app.use(express.static(path.join(__dirname, '..', 'dist')));|" server/index.js
          sed -i "s|res.status(404).json({ error: 'Not found' });|res.sendFile(path.join(__dirname, '..', 'dist', 'index.html'));|" server/index.js

      - name: Archive production artifacts
        run: zip -r release.zip server dist .env

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App (Zip Deploy)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'phonecraft'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
